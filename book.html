<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check City Availability | Leadvate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Shared Styles from index.html */
        :root {
            --primary: #0F172A;
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
            --bg-base: #F8FAFC;
            --text-main: #334155;
            --text-light: #64748B;
            --white: #FFFFFF;
            --font-heading: 'Poppins', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-body);
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--white);
            border-bottom: 1px solid #E2E8F0;
            padding: 1.25rem 0;
            text-align: center;
        }
        .logo-link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .logo-link:hover { opacity: 0.9; }
        .logo-img {
            height: 52px;
            width: auto;
            border-radius: 4px;
        }

        .form-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1.5rem;
        }

        .form-box {
            background: var(--white);
            max-width: 600px;
            width: 100%;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border: 1px solid #E2E8F0;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .welcome-text h1 {
            font-family: var(--font-heading);
            color: var(--primary);
            font-size: 2rem;
            line-height: 1.2;
            margin-bottom: 0.75rem;
        }
        .welcome-text p {
            color: var(--text-light);
            font-size: 1.125rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-size: 0.95rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid #E2E8F0;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.2s;
            background: #F8FAFC;
            color: var(--primary);
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 1.25rem;
            font-family: var(--font-heading);
            font-size: 1.125rem;
            font-weight: 800;
            color: var(--white);
            background: var(--accent);
            border: 2px solid var(--primary);
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 0 var(--primary);
            transition: all 0.1s ease;
            cursor: pointer;
            margin-top: 2rem;
        }
        .btn-submit:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 var(--primary);
        }
        .btn-submit:hover {
            background: var(--accent-hover);
        }
        
        .btn-solid-dark {
            display: block;
            width: 100%;
            padding: 1.25rem;
            font-family: var(--font-heading);
            font-size: 1.125rem;
            font-weight: 800;
            color: var(--white);
            background: var(--primary);
            border: none;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            text-decoration: none;
            transition: all 0.1s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .btn-solid-dark:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 10px -1px rgb(0 0 0 / 0.2);
        }

        .guarantee-text {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-light);
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .guarantee-text svg {
            color: #10B981;
        }

        @media (max-width: 600px) {
            .form-box { padding: 2rem; }
            .welcome-text h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-link">
            <img src="leadvate hosabelaku.jpeg" alt="Leadvate Logo" class="logo-img">
        </a>
    </header>

    <div class="form-container">
        <div class="form-box">
            <div class="welcome-text">
                <h1>Welcome! Let's see if your city is open.</h1>
                <p>We only work with one commercial cleaning partner per area. Fill out the details below to check availability.</p>
            </div>
            
            <form id="availability-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="company">Company Name</label>
                    <input type="text" id="company" name="company" placeholder="Apex Cleaning Services" required>
                </div>

                <div class="form-group">
                    <label for="city">What city do you operate in?</label>
                    <input type="text" id="city" name="city" placeholder="e.g. Dallas, TX" required>
                </div>

                <div class="form-group">
                    <label for="revenue">Current Monthly Revenue</label>
                    <select id="revenue" name="revenue" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="under_5l">Under ₹5,00,000</option>
                        <option value="5l_15l">₹5,00,000 - ₹15,00,000</option>
                        <option value="15l_50l">₹15,00,000 - ₹50,00,000</option>
                        <option value="over_50l">Over ₹50,00,000</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <button type="submit" class="btn-submit">Check Availability & Book Call</button>
                <a href="https://calendly.com/akshaynaikcu3/10min-discussion-call" target="_blank" class="btn-solid-dark">Or Book Directly on Calendly</a>

                <div class="guarantee-text">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Your information is 100% secure and strictly confidential.
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('availability-form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const btn = event.target.querySelector('button[type="submit"]');
            btn.innerText = "Checking...";
            btn.disabled = true;

            const form = event.target;
            const formData = new FormData(form);
            const city = document.getElementById('city').value;

            // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
            const scriptURL = 'https://script.google.com/macros/s/AKfycbypQNwcIN_ZBoyN-9C408tOVXn7zDrDxc3o2_PVujqiKmoAC_m9hFQJN3g7z-4BI8dF/exec';
            
            if (scriptURL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                // If URL is not set yet, just continue to the chat to not break the funnel
                window.location.href = 'chat.html?city=' + encodeURIComponent(city);
                return;
            }

            // Send data to Google Sheets silently in the background
            fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
                .then(response => {
                    // Redirect to the chatbot immediately after sending
                    window.location.href = 'chat.html?city=' + encodeURIComponent(city);
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    // Redirect even if there is an error
                    window.location.href = 'chat.html?city=' + encodeURIComponent(city);
                });
        });
    </script>
</body>
</html>
